<ion-item>
	<ion-label position="floating" [class.ie-text-danger]="formControl.invalid && formControl.touched">
		{{ label() }}
	</ion-label>
	<ion-input
		[type]="type()"
		[placeholder]="placeholder()"
		[formControl]="formControl"
		[class.ie-text-danger]="formControl.invalid && formControl.touched"
	/>
	@if (formControl.invalid && formControl.touched) {
		<div class="ie-text-danger ie-text-small">
			{{ getErrorMessage() }}
		</div>
	}
</ion-item>
